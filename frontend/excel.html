<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Subir Excel - SD Eibar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --eibar-blue: #003366;
            --eibar-red: #a20025;
        }

        .navbar-eibar {
            background-color: var(--eibar-blue) !important;
            border-bottom: 4px solid var(--eibar-red);
        }

        .text-eibar-blue {
            color: var(--eibar-blue) !important;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-eibar shadow">
        <div class="container py-2">
            <a class="navbar-brand d-flex align-items-center gap-3 fw-bold fs-4" href="dashboard.html">
                <img src="../assets/sdeibarlogo.png" alt="Escudo SD Eibar" class="d-inline-block align-text-top"
                    style="height: 60px; width: auto;"> Sistema SD Eibar
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuNavegacion">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNavegacion">
                <div class="navbar-nav ms-auto gap-3 align-items-center mt-3 mt-lg-0">
                    <a href="dashboard.html" class="nav-link text-white opacity-75">Inicio</a>
                    <a href="jugadores.html" class="nav-link text-white opacity-75">Jugadores</a>
                    <a href="temporadas.html" class="nav-link text-white opacity-75">Temporadas</a>
                    <a href="partidos.html" class="nav-link text-white opacity-75">Partidos</a>
                    <a href="lesiones.html" class="nav-link text-white opacity-75">Lesiones</a>

                    <div class="ms-lg-4 ps-lg-4 border-start border-secondary d-flex align-items-center">
                        <a href="login.html" id="btn-login"
                            class="btn btn-warning btn-sm rounded-pill fw-bold text-dark px-4 shadow-sm">Iniciar
                            Sesión</a>
                        <button id="btn-logout" class="btn btn-danger btn-sm rounded-pill fw-bold d-none px-4 shadow-sm"
                            onclick="cerrarSesion()">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card border-0 shadow-lg rounded-4 p-5">

                    <h3 class="text-eibar-blue mb-1 fw-bold text-center">
                        <i class="bi bi-file-earmark-excel me-2"></i>Importar Estadísticas
                    </h3>
                    <p class="text-muted text-center mb-4">Sube el Excel de Wyscout y calcula las puntuaciones</p>

                    <!-- Paso 1: Selector de jugador -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <span class="badge rounded-circle bg-secondary me-1">1</span> Jugador
                        </label>
                        <select id="sel-jugador" class="form-select form-select-lg border-secondary border-opacity-25">
                            <option value="">-- Selecciona un jugador --</option>
                        </select>
                    </div>

                    <!-- Paso 2: Archivo Excel -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <span class="badge rounded-circle bg-secondary me-1">2</span> Archivo Excel (.xlsx)
                        </label>
                        <input type="file" id="archivoExcel" accept=".xlsx,.xls"
                            class="form-control form-control-lg border-secondary border-opacity-25">
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-3 justify-content-center flex-wrap">
                        <button onclick="subirExcel()"
                            class="btn btn-lg px-4 rounded-pill shadow-sm fw-semibold text-white"
                            style="background-color: var(--eibar-blue);">
                            <i class="bi bi-cloud-upload me-2"></i>Subir Excel
                        </button>
                        <button onclick="calcularPuntuaciones()" id="btn-calcular" disabled
                            class="btn btn-lg px-4 rounded-pill shadow-sm fw-semibold text-white"
                            style="background-color: var(--eibar-red);">
                            <i class="bi bi-lightning-charge me-2"></i>Calcular Puntuaciones
                        </button>
                    </div>

                    <!-- Mensaje de resultado de la subida -->
                    <div id="mensaje-subida" class="mt-4 fw-bold text-center"></div>

                    <!-- Ultimo archivo subido -->
                    <div id="ultimo-archivo" class="mt-3 d-none">
                        <hr>
                        <p class="text-muted small mb-1">Archivo listo para procesar:</p>
                        <div class="d-flex align-items-center gap-2 p-2 bg-light rounded-3">
                            <i class="bi bi-file-earmark-excel text-success fs-5"></i>
                            <span id="nombre-ultimo-archivo" class="small fw-semibold text-truncate"></span>
                        </div>
                    </div>

                    <!-- Resultado del calculo de puntuaciones -->
                    <div id="resultado-calculo" class="mt-3 d-none"></div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== SESION =====

        document.addEventListener('DOMContentLoaded', function () {
            fetch('../backend/check_session.php')
                .then(res => res.json())
                .then(data => {
                    const btnLogin = document.getElementById('btn-login');
                    const btnLogout = document.getElementById('btn-logout');

                    if (data.ok) {
                        btnLogin.classList.add('d-none');
                        btnLogout.classList.remove('d-none');
                    } else {
                        btnLogin.classList.remove('d-none');
                        btnLogout.classList.add('d-none');
                    }
                });
        });

        function cerrarSesion() {
            fetch('../backend/logout.php')
                .then(res => res.json())
                .then(data => { if (data.ok) window.location.reload(); });
        }

        // ===== SELECTOR DE JUGADORES =====
        // Carga todos los jugadores en el desplegable

        fetch('../backend/jugadores/get_jugadores.php')
            .then(r => r.json())
            .then(data => {
                if (!data.ok) return;
                const sel = document.getElementById('sel-jugador');
                data.data.forEach(j => {
                    sel.innerHTML += `<option value="${j.id_jugador}">
                        ${j.dorsal ? '#' + j.dorsal + ' · ' : ''}${j.nombre} ${j.apellidos} (${j.posicion_habitual})
                    </option>`;
                });
            });

        // ===== SUBIDA DEL EXCEL =====
        // Guarda el Excel en la carpeta data/ del proyecto Python

        let nombreExcelSubido = null;

        function subirExcel() {
            const mensaje = document.getElementById('mensaje-subida');
            const jugador = document.getElementById('sel-jugador').value;
            const archivo = document.getElementById('archivoExcel').files[0];

            // Validaciones antes de subir
            if (!jugador) {
                mensaje.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>Selecciona un jugador antes de subir.</span>`;
                return;
            }
            if (!archivo) {
                mensaje.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>Selecciona un archivo Excel.</span>`;
                return;
            }

            mensaje.innerHTML = `<span class="text-muted"><i class="bi bi-hourglass-split me-1"></i>Subiendo archivo...</span>`;

            const formData = new FormData();
            formData.append('archivo', archivo);

            fetch('../backend/subida.php', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        nombreExcelSubido = data.nombre;

                        mensaje.innerHTML = `<span class="text-success"><i class="bi bi-check-circle-fill me-1"></i>¡Archivo subido! Ahora pulsa "Calcular Puntuaciones".</span>`;

                        // Mostramos el nombre del archivo subido
                        document.getElementById('nombre-ultimo-archivo').textContent = data.nombre;
                        document.getElementById('ultimo-archivo').classList.remove('d-none');

                        // Activamos el boton de calcular
                        document.getElementById('btn-calcular').disabled = false;
                        document.getElementById('archivoExcel').value = '';
                    } else {
                        mensaje.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>${data.error}</span>`;
                    }
                })
                .catch(() => {
                    mensaje.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle-fill me-1"></i>Error de conexión.</span>`;
                });
        }

        // ===== CALCULAR PUNTUACIONES =====
        // Llama a la API de Python con el id del jugador y el nombre del Excel

        function calcularPuntuaciones() {
            const jugadorId = document.getElementById('sel-jugador').value;
            const resultado = document.getElementById('resultado-calculo');
            const btn = document.getElementById('btn-calcular');

            if (!jugadorId || !nombreExcelSubido) {
                alert('Primero sube el Excel.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="bi bi-hourglass-split me-2"></i>Calculando...`;
            resultado.classList.add('d-none');

            fetch('../backend/jugadores/procesar_jugador.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_jugador: jugadorId, nombre_excel: nombreExcelSubido })
            })
                .then(r => r.json())
                .then(data => {
                    btn.innerHTML = `<i class="bi bi-lightning-charge me-2"></i>Calcular Puntuaciones`;

                    if (data.ok) {
                        // Tabla con el resumen de partidos procesados
                        const filas = data.detalles.map(p => `
                            <tr>
                                <td>${p.fecha}</td>
                                <td>${p.partido}</td>
                                <td><span class="badge bg-secondary">${p.posicion}</span></td>
                                <td><span class="badge bg-dark fs-6">${p.nota}</span></td>
                            </tr>`).join('');

                        resultado.innerHTML = `
                            <hr>
                            <div class="alert alert-success">
                                ✅ <strong>${data.jugador}</strong> — ${data.partidos_procesados} partido(s) procesado(s) correctamente.
                            </div>
                            <div class="table-responsive">
                                <table class="table table-sm table-hover align-middle text-center">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Fecha</th>
                                            <th>Partido</th>
                                            <th>Posición</th>
                                            <th>Nota</th>
                                        </tr>
                                    </thead>
                                    <tbody>${filas}</tbody>
                                </table>
                            </div>`;
                        resultado.classList.remove('d-none');
                        btn.disabled = true; // Evita procesar dos veces el mismo Excel
                    } else {
                        resultado.innerHTML = `
                        <hr>
                        <div class="alert alert-danger">❌ ${data.error}</div>`;
                        resultado.classList.remove('d-none');
                        btn.disabled = false;
                    }
                })
                .catch(() => {
                    btn.innerHTML = `<i class="bi bi-lightning-charge me-2"></i>Calcular Puntuaciones`;
                    btn.disabled = false;
                    resultado.innerHTML = `
                    <hr>
                    <div class="alert alert-danger">
                        ❌ Error de conexión con el servidor. ¿Está arrancada la API de Python?
                    </div>`;
                    resultado.classList.remove('d-none');
                });
        }
    </script>

</body>

</html>
