<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Subir Excel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --eibar-blue: #003366;
            --eibar-red: #a20025;
        }

        .navbar-eibar {
            background-color: var(--eibar-blue) !important;
            border-bottom: 4px solid var(--eibar-red);
        }

        .text-eibar-blue {
            color: var(--eibar-blue) !important;
        }

        .card-stats {
            border-top: 4px solid var(--eibar-blue);
            transition: transform 0.2s;
        }

        .card-stats:hover {
            transform: translateY(-5px);
        }

        .card-red {
            border-top-color: var(--eibar-red);
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-eibar shadow">
        <div class="container py-2">
            <a class="navbar-brand d-flex align-items-center gap-3 fw-bold fs-4" href="dashboard.html">
                <img src="../assets/sdeibarlogo.png" alt="Escudo SD Eibar" class="d-inline-block align-text-top"
                    style="height: 60px; width: auto;"> Sistema SD Eibar
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuNavegacion">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNavegacion">
                <div class="navbar-nav ms-auto gap-3 align-items-center mt-3 mt-lg-0">
                    <a href="dashboard.html"
                        class="nav-link active fw-bold text-white border-bottom border-2 border-danger pb-1">Dashboard</a>
                    <a href="jugadores.html" class="nav-link text-white opacity-75">Jugadores</a>
                    <a href="temporadas.html" class="nav-link text-white opacity-75">Temporadas</a>
                    <a href="partidos.html" class="nav-link text-white opacity-75">Partidos</a>
                    <a href="lesiones.html" class="nav-link text-white opacity-75">Lesiones</a>

                    <div class="ms-lg-4 ps-lg-4 border-start border-secondary d-flex align-items-center">
                        <a href="login.html" id="btn-login"
                            class="btn btn-warning btn-sm rounded-pill fw-bold text-dark px-4 shadow-sm">Iniciar
                            Sesión</a>
                        <button id="btn-logout" class="btn btn-danger btn-sm rounded-pill fw-bold d-none px-4 shadow-sm"
                            onclick="cerrarSesion()">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">

                <div class="row g-3 align-items-center mb-4">
                    <div class="col-12 col-lg-6">
                        <div>
                            <h2 class="fw-bold mb-1">Importar Excel</h2>
                            <p class="text-muted mb-0">Sube un archivo Excel y asígnalo a un partido del sistema</p>
                        </div>
                    </div>

                    <div class="col-12 col-lg-6 text-lg-end">
                        <a href="importaciones.html" class="btn btn-outline-dark btn-lg px-4 rounded-3">
                            Ver historial de importaciones
                        </a>
                    </div>
                </div>

                <form action="../backend/upload_excel.php" method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Seleccionar Partido</label>
                            <select name="id_partido" id="select-partido" class="form-select form-select-lg rounded-3"
                                required>
                                <option value="" disabled selected>Elige un partido...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Archivo (.xls, .xlsx, .csv)</label>
                            <input type="file" name="excel" id="excel" class="form-control form-control-lg rounded-3"
                                accept=".xls,.xlsx,.csv" required>
                        </div>
                    </div>

                    <div class="mt-4 d-flex flex-wrap gap-3">
                        <button type="submit" class="btn btn-primary btn-lg px-4 rounded-3 shadow-sm">
                            Subir archivo
                        </button>
                        <a href="partidos.html" class="btn btn-outline-secondary btn-lg px-4 rounded-3">
                            Ir a partidos
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        fetch('../backend/partidos/get_partidos.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const select = document.getElementById('select-partido');

                    datos.data.forEach(partido => {
                        select.innerHTML += `
                            <option value="${partido.id_partido}">
                                ${partido.fecha} - ${partido.rival} (${partido.competicion})
                            </option>
                        `;
                    });
                } else {
                    alert("Error al cargar partidos: " + datos.error);
                }
            });
    </script>

</body>

</html>
