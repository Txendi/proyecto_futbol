<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Partidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Partidos SD Eibar</h2>
            <input type="text" id="search-rival" class="form-control" placeholder="Buscar Rival" oninput="filtrarPartidos()">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                + Añadir Partido
            </button>
        </div>

        <table class="table table-striped table-bordered bg-white shadow-sm text-center">
            <thead class="table-dark">
                <tr>
                    <th>Rival</th>
                    <th>Fecha</th>
                    <th>Competición</th>
                    <th>Local/Visitante</th>
                    <th>Goles a Favor</th>
                    <th>Goles en Contra</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script>
        fetch('../backend/partidos/get_partidos.php?id_temporada=1')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const tbody = document.getElementById('cuerpo-tabla');
                    datos.data.forEach(partido => {
                        tbody.innerHTML += `
                        <tr>
                            <td>${partido.rival}</td>
                            <td>${partido.fecha}</td>
                            <td>${partido.competicion}</td>
                            <td>${partido.local_visitante}</td>
                            <td>${partido.goles_favor}</td>
                            <td>${partido.goles_contra}</td>
                            <td>
                                <button class="btn btn-sm btn-warning">Editar</button>
                                <button class="btn btn-sm btn-danger">Borrar</button>
                            </td>
                        </tr>
                    `;
                    });
                } else {
                    alert("Error al cargar partidos: " + datos.error);
                }
            });

        function guardarNuevo() {
            const datos = {
                id_temporada: document.getElementById('add-temporada').value,
                rival: document.getElementById('add-rival').value,
                fecha: document.getElementById('add-fecha').value,
                competicion: document.getElementById('add-competicion').value,
                local_visitante: document.getElementById('add-local-visitante').value,
                goles_favor: document.getElementById('add-goles-favor').value,
                goles_contra: document.getElementById('add-goles-contra').value
            };

            fetch('../backend/partidos/add_partido.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al guardar: " + resultado.error);
                    }
                });
        }

        function filtrarPartidos() {
            const busqueda = document.getElementById('search-rival').value;

            fetch(`../backend/partidos/get_partidos.php?rival=${busqueda}`)
                .then(respuesta => respuesta.json())
                .then(datos => {
                    const tbody = document.getElementById('cuerpo-tabla');
                    tbody.innerHTML = "";

                    if (datos.ok) {
                        datos.data.forEach(partido => {
                            tbody.innerHTML += `
                    <tr>
                        <td>${partido.rival}</td>
                        <td>${partido.fecha}</td>
                        <td>${partido.competicion}</td>
                        <td>${partido.local_visitante}</td>
                        <td>${partido.goles_favor}</td>
                        <td>${partido.goles_contra}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editarPartido(${partido.id_partido})">Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="borrarPartido(${partido.id_partido})">Borrar</button>
                        </td>
                    </tr>
                    `;
                        });
                    } else {
                        alert("Error al cargar partidos: " + datos.error);
                    }
                });
        }

        fetch('../backend/temporadas/get_temporadas.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const selectTemporada = document.getElementById('add-temporada');
                    datos.data.forEach(temporada => {
                        selectTemporada.innerHTML += `
                            <option value="${temporada.id_temporada}">${temporada.nombre}</option>
                        `;
                    });
                } else {
                    alert("Error al cargar temporadas: " + datos.error);
                }
            });
    </script>

    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Añadir Partido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="add-temporada" class="form-control mb-2" required>
                        <option value="" disabled selected>Selecciona una temporada</option>
                    </select>
                    <input type="text" id="add-rival" class="form-control mb-2" placeholder="Rival" required>
                    <input type="date" id="add-fecha" class="form-control mb-2" required>
                    <input type="text" id="add-competicion" class="form-control mb-2" placeholder="Competición" required>
                    <select id="add-local-visitante" class="form-control mb-2" required>
                        <option value="local">Local</option>
                        <option value="visitante">Visitante</option>
                    </select>
                    <input type="number" id="add-goles-favor" class="form-control mb-2" placeholder="Goles a favor" required>
                    <input type="number" id="add-goles-contra" class="form-control mb-2" placeholder="Goles en contra" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="guardarNuevo()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
