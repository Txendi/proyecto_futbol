<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Partidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --eibar-blue: #003366;
            --eibar-red: #a20025;
        }

        .navbar-eibar {
            background-color: var(--eibar-blue) !important;
            border-bottom: 4px solid var(--eibar-red);
        }

        .text-eibar-blue {
            color: var(--eibar-blue) !important;
        }

        .card-stats {
            border-top: 4px solid var(--eibar-blue);
            transition: transform 0.2s;
        }

        .card-stats:hover {
            transform: translateY(-5px);
        }

        .card-red {
            border-top-color: var(--eibar-red);
        }

        .btn-eibar-red {
            background-color: var(--eibar-red);
            color: white;
            border: none;
        }

        .btn-eibar-red:hover {
            background-color: #82001c;
            color: white;
        }

        .table-hover tbody tr {
            transition: all 0.2s ease-in-out;
        }

        .table-hover tbody tr:hover {
            transform: scale(1.015);
            box-shadow: 0 5px 15px rgba(0, 51, 102, 0.15);
            background-color: #ffffff !important;
            z-index: 1;
            position: relative;
        }

        .btn-admin {
            display: none !important;
        }

        body.is-admin .btn-admin {
            display: inline-block !important;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-eibar shadow">
        <div class="container py-2">
            <a class="navbar-brand d-flex align-items-center gap-3 fw-bold fs-4" href="dashboard.html">
                <img src="../assets/sdeibarlogo.png" alt="Escudo SD Eibar" class="d-inline-block align-text-top"
                    style="height: 60px; width: auto;"> Sistema SD Eibar
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuNavegacion">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNavegacion">
                <div class="navbar-nav ms-auto gap-3 align-items-center mt-3 mt-lg-0">
                    <a href="dashboard.html" class="nav-link text-white opacity-75">Dashboard</a>
                    <a href="jugadores.html" class="nav-link text-white opacity-75">Jugadores</a>
                    <a href="temporadas.html" class="nav-link text-white opacity-75">Temporadas</a>
                    <a href="partidos.html"
                        class="nav-link active fw-bold text-white border-bottom border-2 border-danger pb-1">Partidos</a>
                    <a href="lesiones.html" class="nav-link text-white opacity-75">Lesiones</a>

                    <div class="ms-lg-4 ps-lg-4 border-start border-secondary d-flex align-items-center gap-2">
                        <span id="user-role-badge" class="badge bg-light text-dark d-none">Rol</span>
                        <a href="login.html" id="btn-login"
                            class="btn btn-warning btn-sm rounded-pill fw-bold text-dark px-4 shadow-sm">Iniciar
                            Sesión</a>
                        <button id="btn-logout" class="btn btn-danger btn-sm rounded-pill fw-bold d-none px-4 shadow-sm"
                            onclick="cerrarSesion()">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">

                <div class="row g-3 align-items-center mb-4">
                    <div class="col-12 col-lg-4">
                        <h2 class="fw-bold mb-1 text-eibar-blue">Partidos</h2>
                        <p class="text-muted mb-0">Gestión de partidos disputados</p>
                    </div>
                    <div class="col-12 col-lg-5">
                        <div
                            class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden border border-secondary border-opacity-25">
                            <span class="input-group-text bg-white border-0 text-eibar-blue"><i
                                    class="bi bi-search"></i></span>
                            <input type="text" id="search-rival" class="form-control border-0 ps-0 shadow-none"
                                placeholder="Buscar por rival..." oninput="filtrarPartidos()">
                        </div>
                    </div>
                    <div class="col-12 col-lg-3 text-lg-end">
                        <button class="btn btn-eibar-red btn-lg px-4 rounded-pill shadow btn-admin fw-semibold"
                            data-bs-toggle="modal" data-bs-target="#modalNuevo">
                            <i class="bi bi-plus-circle me-2"></i>Añadir
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Rival</th>
                                <th>Fecha</th>
                                <th>Competición</th>
                                <th>Local/Visitante</th>
                                <th>Goles a Favor</th>
                                <th>Goles en Contra</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-tabla">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('../backend/check_session.php').then(res => res.json()).then(data => {
                const btnLogin = document.getElementById('btn-login');
                const btnLogout = document.getElementById('btn-logout');
                const roleBadge = document.getElementById('user-role-badge');
                if (data.ok) {
                    btnLogin.classList.add('d-none'); btnLogout.classList.remove('d-none');
                    roleBadge.textContent = data.rol.toUpperCase(); roleBadge.classList.remove('d-none');
                    if (data.rol === 'admin') document.body.classList.add('is-admin');
                } else {
                    btnLogin.classList.remove('d-none'); btnLogout.classList.add('d-none');
                    document.body.classList.remove('is-admin');
                }
            });
        });

        function cargarPartidos(url) {
            fetch(url)
                .then(respuesta => respuesta.json())
                .then(datos => {
                    const tbody = document.getElementById('cuerpo-tabla');
                    tbody.innerHTML = "";

                    if (datos.ok) {
                        datos.data.forEach(partido => {
                            tbody.innerHTML += `
                                <tr class="align-middle border-bottom border-light">
                                    <td class="fw-bold text-dark"><i class="bi bi-shield-fill me-2 text-eibar-blue"></i>${partido.rival}</td>
                                    <td class="text-secondary fw-semibold"><i class="bi bi-calendar-event me-2"></i>${partido.fecha}</td>
                                    <td><span class="badge bg-light text-dark border px-2 py-1">${partido.competicion}</span></td>
                                    <td><span class="badge bg-${partido.local_visitante === 'local' ? 'primary' : 'info'} bg-opacity-75 rounded-pill px-3 py-2">${partido.local_visitante.toUpperCase()}</span></td>
                                    <td class="fw-bold fs-5 text-success" colspan="2">${partido.goles_favor} <span class="text-dark mx-1">-</span> <span class="text-danger">${partido.goles_contra}</span></td>
                                    <td>
                                        <div class="d-flex justify-content-center gap-2">
                                            <button class="btn btn-sm btn-outline-warning rounded-pill px-3 fw-semibold btn-admin" onclick="abrirEditar(${partido.id_partido}, ${partido.id_temporada}, '${partido.rival}', '${partido.fecha}', '${partido.competicion}', '${partido.local_visitante}', ${partido.goles_favor}, ${partido.goles_contra})"><i class="bi bi-pencil-square me-1"></i>Editar</button>
                                            <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-semibold btn-admin" onclick="borrarPartido(${partido.id_partido})"><i class="bi bi-trash3-fill me-1"></i>Borrar</button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        alert("Error al cargar partidos: " + datos.error);
                    }
                });
        }

        cargarPartidos('../backend/partidos/get_partidos.php');

        function guardarNuevo() {
            const datos = {
                id_temporada: document.getElementById('add-temporada').value,
                rival: document.getElementById('add-rival').value,
                fecha: document.getElementById('add-fecha').value,
                competicion: document.getElementById('add-competicion').value,
                local_visitante: document.getElementById('add-local-visitante').value,
                goles_favor: document.getElementById('add-goles-favor').value,
                goles_contra: document.getElementById('add-goles-contra').value
            };

            fetch('../backend/partidos/add_partido.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al guardar: " + resultado.error);
                    }
                });
        }

        function filtrarPartidos() {
            const busqueda = document.getElementById('search-rival').value;
            cargarPartidos(`../backend/partidos/get_partidos.php?rival=${encodeURIComponent(busqueda)}`);
        }

        function borrarPartido(id) {
            let confirmar = confirm("¿Seguro que quieres eliminar este partido?");

            if (confirmar) {
                fetch('../backend/partidos/delete_partido.php', {
                    method: 'POST',
                    body: JSON.stringify({ id_partido: id })
                })
                    .then(respuesta => respuesta.json())
                    .then(datos => {
                        if (datos.ok) {
                            window.location.reload();
                        } else {
                            alert("Error al borrar: " + datos.error);
                        }
                    });
            }
        }

        function abrirEditar(id, id_temporada, rival, fecha, competicion, local_visitante, goles_favor, goles_contra) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-temporada').value = id_temporada;
            document.getElementById('edit-rival').value = rival;
            document.getElementById('edit-fecha').value = fecha;
            document.getElementById('edit-competicion').value = competicion;
            document.getElementById('edit-local-visitante').value = local_visitante;
            document.getElementById('edit-goles-favor').value = goles_favor;
            document.getElementById('edit-goles-contra').value = goles_contra;

            const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
            modal.show();
        }

        function guardarEditar() {
            const datos = {
                id_partido: document.getElementById('edit-id').value,
                id_temporada: document.getElementById('edit-temporada').value,
                rival: document.getElementById('edit-rival').value,
                fecha: document.getElementById('edit-fecha').value,
                competicion: document.getElementById('edit-competicion').value,
                local_visitante: document.getElementById('edit-local-visitante').value,
                goles_favor: document.getElementById('edit-goles-favor').value,
                goles_contra: document.getElementById('edit-goles-contra').value
            };

            fetch('../backend/partidos/update_partido.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al editar: " + resultado.error);
                    }
                });
        }

        fetch('../backend/temporadas/get_temporadas.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const selectAdd = document.getElementById('add-temporada');
                    const selectEdit = document.getElementById('edit-temporada');

                    datos.data.forEach(temporada => {
                        selectAdd.innerHTML += `
                            <option value="${temporada.id_temporada}">${temporada.nombre}</option>
                        `;

                        selectEdit.innerHTML += `
                            <option value="${temporada.id_temporada}">${temporada.nombre}</option>
                        `;
                    });
                } else {
                    alert("Error al cargar temporadas: " + datos.error);
                }
            });
    </script>

    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Añadir Partido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-3">
                    <select id="add-temporada" class="form-select form-select-lg rounded-3 mb-3" required>
                        <option value="" disabled selected>Selecciona una temporada</option>
                    </select>

                    <input type="text" id="add-rival" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Rival" required>

                    <input type="date" id="add-fecha" class="form-control form-control-lg rounded-3 mb-3" required>

                    <input type="text" id="add-competicion" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Competición" required>

                    <select id="add-local-visitante" class="form-select form-select-lg rounded-3 mb-3" required>
                        <option value="local">Local</option>
                        <option value="visitante">Visitante</option>
                    </select>

                    <input type="number" id="add-goles-favor" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Goles a favor" required>

                    <input type="number" id="add-goles-contra" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Goles en contra" required>
                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-primary px-4 rounded-3"
                        onclick="guardarNuevo()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Editar Partido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-3">
                    <input type="hidden" id="edit-id">

                    <select id="edit-temporada" class="form-select form-select-lg rounded-3 mb-3" required>
                        <option value="" disabled selected>Selecciona una temporada</option>
                    </select>

                    <input type="text" id="edit-rival" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Rival" required>

                    <input type="date" id="edit-fecha" class="form-control form-control-lg rounded-3 mb-3" required>

                    <input type="text" id="edit-competicion" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Competición" required>

                    <select id="edit-local-visitante" class="form-select form-select-lg rounded-3 mb-3" required>
                        <option value="local">Local</option>
                        <option value="visitante">Visitante</option>
                    </select>

                    <input type="number" id="edit-goles-favor" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Goles a favor" required>

                    <input type="number" id="edit-goles-contra" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Goles en contra" required>
                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-primary px-4 rounded-3" onclick="guardarEditar()">Guardar
                        cambios</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
