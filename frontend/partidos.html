<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Partidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Sistema SD Eibar</span>
            <div>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="jugadores.html" class="btn btn-outline-light btn-sm">Jugadores</a>
                <a href="temporadas.html" class="btn btn-outline-light btn-sm">Temporadas</a>
                <a href="partidos.html" class="btn btn-outline-light btn-sm">Partidos</a>
                <a href="lesiones.html" class="btn btn-outline-light btn-sm">Lesiones</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h2>Partidos SD Eibar</h2>
            </div>

            <div class="col-md-4">
                <input type="text" id="search-rival" class="form-control" placeholder="Buscar Rival"
                    oninput="filtrarPartidos()">
            </div>

            <div class="col-md-2 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                    + Añadir Partido
                </button>
            </div>
        </div>

        <table class="table table-striped table-bordered bg-white shadow-sm text-center">
            <thead class="table-dark">
                <tr>
                    <th>Rival</th>
                    <th>Fecha</th>
                    <th>Competición</th>
                    <th>Local/Visitante</th>
                    <th>Goles a Favor</th>
                    <th>Goles en Contra</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script>
        function cargarPartidos(url) {
            fetch(url)
                .then(respuesta => respuesta.json())
                .then(datos => {
                    const tbody = document.getElementById('cuerpo-tabla');
                    tbody.innerHTML = "";

                    if (datos.ok) {
                        datos.data.forEach(partido => {
                            tbody.innerHTML += `
                            <tr>
                                <td>${partido.rival}</td>
                                <td>${partido.fecha}</td>
                                <td>${partido.competicion}</td>
                                <td>${partido.local_visitante}</td>
                                <td>${partido.goles_favor}</td>
                                <td>${partido.goles_contra}</td>
                                <td>
                                    <button class="btn btn-sm btn-warning" 
                                        onclick="abrirEditar(${partido.id_partido}, ${partido.id_temporada}, \"${partido.rival}\", \"${partido.fecha}\", \"${partido.competicion}\", \"${partido.local_visitante}\", ${partido.goles_favor}, ${partido.goles_contra})"
                                        Editar
                                    </button>
                                    <button class="btn btn-sm btn-danger"
                                        onclick="borrarPartido(${partido.id_partido})">
                                        Borrar
                                    </button>
                                </td>
                            </tr>
                        `;
                        });
                    } else {
                        alert("Error al cargar partidos: " + datos.error);
                    }
                });
        }

        cargarPartidos('../backend/partidos/get_partidos.php');

        function guardarNuevo() {
            const datos = {
                id_temporada: document.getElementById('add-temporada').value,
                rival: document.getElementById('add-rival').value,
                fecha: document.getElementById('add-fecha').value,
                competicion: document.getElementById('add-competicion').value,
                local_visitante: document.getElementById('add-local-visitante').value,
                goles_favor: document.getElementById('add-goles-favor').value,
                goles_contra: document.getElementById('add-goles-contra').value
            };

            fetch('../backend/partidos/add_partido.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al guardar: " + resultado.error);
                    }
                });
        }

        function filtrarPartidos() {
            const busqueda = document.getElementById('search-rival').value;
            cargarPartidos(`../backend/partidos/get_partidos.php?rival=${encodeURIComponent(busqueda)}`);
        }

        function borrarPartido(id) {
            let confirmar = confirm("¿Seguro que quieres eliminar este partido?");

            if (confirmar) {
                fetch('../backend/partidos/delete_partido.php', {
                    method: 'POST',
                    body: JSON.stringify({ id_partido: id })
                })
                    .then(respuesta => respuesta.json())
                    .then(datos => {
                        if (datos.ok) {
                            window.location.reload();
                        } else {
                            alert("Error al borrar: " + datos.error);
                        }
                    });
            }
        }

        function abrirEditar(id, id_temporada, rival, fecha, competicion, local_visitante, goles_favor, goles_contra) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-temporada').value = id_temporada;
            document.getElementById('edit-rival').value = rival;
            document.getElementById('edit-fecha').value = fecha;
            document.getElementById('edit-competicion').value = competicion;
            document.getElementById('edit-local-visitante').value = local_visitante;
            document.getElementById('edit-goles-favor').value = goles_favor;
            document.getElementById('edit-goles-contra').value = goles_contra;

            const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
            modal.show();
        }

        function guardarEditar() {
            const datos = {
                id_partido: document.getElementById('edit-id').value,
                id_temporada: document.getElementById('edit-temporada').value,
                rival: document.getElementById('edit-rival').value,
                fecha: document.getElementById('edit-fecha').value,
                competicion: document.getElementById('edit-competicion').value,
                local_visitante: document.getElementById('edit-local-visitante').value,
                goles_favor: document.getElementById('edit-goles-favor').value,
                goles_contra: document.getElementById('edit-goles-contra').value
            };

            fetch('../backend/partidos/update_partido.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al editar: " + resultado.error);
                    }
                });
        }

        fetch('../backend/temporadas/get_temporadas.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const selectAdd = document.getElementById('add-temporada');
                    const selectEdit = document.getElementById('edit-temporada');

                    datos.data.forEach(temporada => {
                        selectAdd.innerHTML += `
                            <option value="${temporada.id_temporada}">${temporada.nombre}</option>
                        `;

                        selectEdit.innerHTML += `
                            <option value="${temporada.id_temporada}">${temporada.nombre}</option>
                        `;
                    });
                } else {
                    alert("Error al cargar temporadas: " + datos.error);
                }
            });
    </script>

    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Añadir Partido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="add-temporada" class="form-control mb-2" required>
                        <option value="" disabled selected>Selecciona una temporada</option>
                    </select>
                    <input type="text" id="add-rival" class="form-control mb-2" placeholder="Rival" required>
                    <input type="date" id="add-fecha" class="form-control mb-2" required>
                    <input type="text" id="add-competicion" class="form-control mb-2" placeholder="Competición"
                        required>
                    <select id="add-local-visitante" class="form-control mb-2" required>
                        <option value="local">Local</option>
                        <option value="visitante">Visitante</option>
                    </select>
                    <input type="number" id="add-goles-favor" class="form-control mb-2" placeholder="Goles a favor"
                        required>
                    <input type="number" id="add-goles-contra" class="form-control mb-2" placeholder="Goles en contra"
                        required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="guardarNuevo()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Partido</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">

                    <select id="edit-temporada" class="form-control mb-2" required>
                        <option value="" disabled selected>Selecciona una temporada</option>
                    </select>

                    <input type="text" id="edit-rival" class="form-control mb-2" placeholder="Rival" required>
                    <input type="date" id="edit-fecha" class="form-control mb-2" required>
                    <input type="text" id="edit-competicion" class="form-control mb-2" placeholder="Competición"
                        required>
                    <select id="edit-local-visitante" class="form-control mb-2" required>
                        <option value="local">Local</option>
                        <option value="visitante">Visitante</option>
                    </select>
                    <input type="number" id="edit-goles-favor" class="form-control mb-2" placeholder="Goles a favor"
                        required>
                    <input type="number" id="edit-goles-contra" class="form-control mb-2" placeholder="Goles en contra"
                        required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="guardarEditar()">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
