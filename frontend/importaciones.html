<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial de Importaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container py-2">
            <a class="navbar-brand fw-bold" href="dashboard.html">Sistema SD Eibar</a>

            <div class="d-flex flex-wrap gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm rounded-pill">Dashboard</a>
                <a href="jugadores.html" class="btn btn-outline-light btn-sm rounded-pill">Jugadores</a>
                <a href="temporadas.html" class="btn btn-outline-light btn-sm rounded-pill">Temporadas</a>
                <a href="partidos.html" class="btn btn-outline-light btn-sm rounded-pill">Partidos</a>
                <a href="lesiones.html" class="btn btn-outline-light btn-sm rounded-pill">Lesiones</a>
                <a href="excel.html" class="btn btn-outline-light btn-sm rounded-pill">Excel</a>
                <a href="importaciones.html" class="btn btn-light btn-sm rounded-pill fw-semibold">Importaciones</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">

                <div class="row g-3 align-items-center mb-4">
                    <div class="col-12 col-lg-6">
                        <div>
                            <h2 class="fw-bold mb-1">Historial de importaciones</h2>
                            <p class="text-muted mb-0">Consulta los archivos Excel subidos y el partido asociado</p>
                        </div>
                    </div>

                    <div class="col-12 col-lg-6 text-lg-end">
                        <a href="excel.html" class="btn btn-primary btn-lg px-4 rounded-3 shadow-sm">
                            + Nueva importación
                        </a>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>Partido</th>
                                <th>Archivo</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpo-importaciones">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        fetch('../backend/get_importaciones.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                const tbody = document.getElementById('cuerpo-importaciones');
                tbody.innerHTML = "";

                if (datos.ok && datos.data.length > 0) {
                    datos.data.forEach(importacion => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${importacion.id_importacion}</td>
                                <td>${importacion.fecha_subida}</td>
                                <td>${importacion.fecha_partido} - ${importacion.rival}</td>
                                <td>${importacion.nombre_archivo}</td>
                                <td>
                                    <a href="${importacion.ruta_archivo}" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                        Ver archivo
                                    </a>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="text-muted py-4">No hay importaciones registradas</td>
                        </tr>
                    `;
                }
            })
            .catch(() => {
                const tbody = document.getElementById('cuerpo-importaciones');
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-danger py-4">Error al cargar las importaciones</td>
                    </tr>
                `;
            });
    </script>

</body>

</html>
