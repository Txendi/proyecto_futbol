<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container py-2">
            <a class="navbar-brand fw-bold" href="dashboard.html">Sistema SD Eibar</a>

            <div class="d-flex flex-wrap gap-2">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm rounded-pill">Dashboard</a>
                <a href="jugadores.html" class="btn btn-light btn-sm rounded-pill fw-semibold">Jugadores</a>
                <a href="temporadas.html" class="btn btn-outline-light btn-sm rounded-pill">Temporadas</a>
                <a href="partidos.html" class="btn btn-outline-light btn-sm rounded-pill">Partidos</a>
                <a href="lesiones.html" class="btn btn-outline-light btn-sm rounded-pill">Lesiones</a>
                <a href="excel.html" class="btn btn-outline-light btn-sm rounded-pill">Excel</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4">

                <div class="row g-3 align-items-center mb-4">
                    <div class="col-12 col-lg-4">
                        <div>
                            <h2 class="fw-bold mb-1">Jugadores</h2>
                            <p class="text-muted mb-0">Gestión de los jugadores registrados en el sistema</p>
                        </div>
                    </div>

                    <div class="col-12 col-lg-4">
                        <input type="text" id="search" class="form-control form-control-lg rounded-3"
                            placeholder="Buscar jugador..." oninput="filtrarJugadores()">
                    </div>

                    <div class="col-12 col-lg-4 text-lg-end">
                        <button class="btn btn-primary btn-lg px-4 rounded-3 shadow-sm"
                            data-bs-toggle="modal" data-bs-target="#modalNuevo">
                            + Añadir Jugador
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Apellidos</th>
                                <th>Alias</th>
                                <th>Posición</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-jugadores">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Editar Jugador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-3">
                    <input type="hidden" id="edit-id">

                    <input type="text" id="edit-nombre" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Nombre" required>

                    <input type="text" id="edit-apellidos" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Apellidos" required>

                    <input type="text" id="edit-alias" class="form-control form-control-lg rounded-3 mb-3"
                        placeholder="Alias">

                    <select id="edit-posicion" class="form-select form-select-lg rounded-3 mb-3" required>
                        <option value="" disabled selected>Selecciona una posición</option>
                        <option value="POR">Portero</option>
                        <option value="DFC">Central</option>
                        <option value="LD">Lateral Derecho</option>
                        <option value="LI">Lateral Izquierdo</option>
                        <option value="MCD">Mediocentro Defensivo</option>
                        <option value="MC">Mediocentro</option>
                        <option value="MCO">Mediocentro Ofensivo</option>
                        <option value="EXTD">Extremo Derecho</option>
                        <option value="EXTI">Extremo Izquierdo</option>
                        <option value="DC">Delantero Centro</option>
                    </select>

                    <select id="edit-estado" class="form-select form-select-lg rounded-3 mb-3">
                        <option value="activo">Activo</option>
                        <option value="lesionado">Lesionado</option>
                    </select>
                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-primary px-4 rounded-3"
                        onclick="guardarEditar()">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Añadir Jugador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-3">
                    <form id="formNuevo">
                        <input type="text" id="add-nombre" class="form-control form-control-lg rounded-3 mb-3"
                            placeholder="Nombre" required>

                        <input type="text" id="add-apellidos" class="form-control form-control-lg rounded-3 mb-3"
                            placeholder="Apellidos" required>

                        <input type="text" id="add-alias" class="form-control form-control-lg rounded-3 mb-3"
                            placeholder="Alias">

                        <select id="add-posicion" class="form-select form-select-lg rounded-3 mb-3" required>
                            <option value="" disabled selected>Selecciona una posición</option>
                            <option value="POR">Portero</option>
                            <option value="DFC">Central</option>
                            <option value="LD">Lateral Derecho</option>
                            <option value="LI">Lateral Izquierdo</option>
                            <option value="MCD">Mediocentro Defensivo</option>
                            <option value="MC">Mediocentro</option>
                            <option value="MCO">Mediocentro Ofensivo</option>
                            <option value="EXTD">Extremo Derecho</option>
                            <option value="EXTI">Extremo Izquierdo</option>
                            <option value="DC">Delantero Centro</option>
                        </select>

                        <select id="add-estado" class="form-select form-select-lg rounded-3 mb-3">
                            <option value="activo">Activo</option>
                            <option value="lesionado">Lesionado</option>
                        </select>
                    </form>
                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-primary px-4 rounded-3"
                        onclick="guardarNuevo()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('../backend/jugadores/get_jugadores.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    listarJugadores(datos.data);
                }
            });

        function listarJugadores(jugadores) {
            const tbody = document.getElementById('lista-jugadores');
            tbody.innerHTML = "";

            jugadores.forEach(jugador => {
                let badgeEstado = jugador.estado === 'activo'
                    ? '<span class="badge rounded-pill text-bg-success px-3 py-2">Activo</span>'
                    : '<span class="badge rounded-pill text-bg-danger px-3 py-2">Lesionado</span>';

                tbody.innerHTML += `
                    <tr>
                        <td>${jugador.nombre}</td>
                        <td>${jugador.apellidos}</td>
                        <td>${jugador.alias}</td>
                        <td>${jugador.posicion_habitual}</td>
                        <td>${badgeEstado}</td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <button class="btn btn-sm btn-outline-warning rounded-pill px-3"
                                    onclick="abrirEditar(${jugador.id_jugador}, '${jugador.nombre}', '${jugador.apellidos}', '${jugador.alias}', '${jugador.posicion_habitual}', '${jugador.estado}')">
                                    Editar
                                </button>
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                    onclick="borrar(${jugador.id_jugador})">
                                    Borrar
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function abrirEditar(id, nombre, apellidos, alias, posicion, estado) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nombre').value = nombre;
            document.getElementById('edit-apellidos').value = apellidos;
            document.getElementById('edit-alias').value = alias;
            document.getElementById('edit-posicion').value = posicion;
            document.getElementById('edit-estado').value = estado;

            const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
            modal.show();
        }

        function guardarEditar() {
            const datos = {
                id_jugador: document.getElementById('edit-id').value,
                nombre: document.getElementById('edit-nombre').value,
                apellidos: document.getElementById('edit-apellidos').value,
                alias: document.getElementById('edit-alias').value,
                posicion_habitual: document.getElementById('edit-posicion').value,
                estado: document.getElementById('edit-estado').value
            };

            fetch('../backend/jugadores/update_jugador.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al editar: " + resultado.error);
                    }
                });
        }

        function guardarNuevo() {
            const datos = {
                nombre: document.getElementById('add-nombre').value,
                apellidos: document.getElementById('add-apellidos').value,
                alias: document.getElementById('add-alias').value,
                posicion_habitual: document.getElementById('add-posicion').value,
                estado: document.getElementById('add-estado').value
            };

            fetch('../backend/jugadores/add_jugador.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al guardar: " + resultado.error);
                    }
                });
        }

        function borrar(id) {
            let mensaje = confirm("¿Seguro que quieres eliminar a este jugador?");

            if (mensaje) {
                fetch('../backend/jugadores/delete_jugador.php', {
                    method: 'POST',
                    body: JSON.stringify({ id_jugador: id })
                })
                    .then(respuesta => respuesta.json())
                    .then(datos => {
                        if (datos.ok) {
                            window.location.reload();
                        } else {
                            alert("Error al borrar: " + datos.error);
                        }
                    });
            }
        }

        function filtrarJugadores() {
            const busqueda = document.getElementById('search').value;

            fetch(`../backend/jugadores/get_jugadores.php?query=${busqueda}`)
                .then(respuesta => respuesta.json())
                .then(datos => {
                    if (datos.ok) {
                        listarJugadores(datos.data);
                    }
                });
        }
    </script>

</body>

</html>
