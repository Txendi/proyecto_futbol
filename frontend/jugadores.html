<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Jugadores SD Eibar</h2>
            <input type="text" id="search" class="form-control" placeholder="Buscar Jugador"
                oninput="filtrarJugadores()">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                + Añadir Jugador
            </button>
        </div>

        <table class="table table-striped table-bordered bg-white shadow-sm text-center">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Alias</th>
                    <th>Posición</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script>
        fetch('../backend/jugadores/get_jugadores.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const tbody = document.getElementById('cuerpo-tabla');
                    datos.data.forEach(jugador => {
                        tbody.innerHTML += `
                        <tr>
                            <td>${jugador.nombre}</td>
                            <td>${jugador.apellidos}</td>
                            <td>${jugador.alias}</td>
                            <td>${jugador.posicion_habitual}</td>
                            <td><span class="badge ${jugador.estado === 'lesionado' ? 'bg-danger' : 'bg-success'}">${jugador.estado}</span></td>
                            <td><button class="btn btn-sm btn-warning" onclick="abrirEditar(${jugador.id_jugador}, '${jugador.nombre}', '${jugador.apellidos}', '${jugador.alias}', '${jugador.posicion_habitual}', '${jugador.estado}')">Editar</button>
                                <button class="btn btn-sm btn-danger" onclick="borrar(${jugador.id_jugador})">Borrar</button></td>
                        </tr>
                    `;
                    });
                } else {
                    alert("Error al cargar jugadores: " + datos.error);
                }
            });

        function borrar(id) {
            let mensaje = confirm("¿Seguro que quieres eliminar a este jugador?");

            if (mensaje) {
                fetch('../backend/jugadores/delete_jugador.php', {
                    method: 'POST',
                    body: JSON.stringify({ id_jugador: id })
                })
                    .then(respuesta => respuesta.json())
                    .then(datos => {
                        if (datos.ok) {
                            window.location.reload();
                        } else {
                            alert("Error al borrar: " + datos.error);
                        }
                    });
            }
        }

        function guardarNuevo() {
            const datos = {
                nombre: document.getElementById('add-nombre').value,
                apellidos: document.getElementById('add-apellidos').value,
                alias: document.getElementById('add-alias').value,
                posicion_habitual: document.getElementById('add-posicion').value,
                estado: document.getElementById('add-estado').value
            };

            fetch('../backend/jugadores/add_jugador.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al guardar: " + resultado.error);
                    }
                });
        }

        function abrirEditar(id, nombre, apellidos, alias, posicion, estado) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nombre').value = nombre;
            document.getElementById('edit-apellidos').value = apellidos;
            document.getElementById('edit-alias').value = alias;
            document.getElementById('edit-posicion').value = posicion;
            document.getElementById('edit-estado').value = estado;

            const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
            modal.show();
        }

        function guardarEditar() {
            const datos = {
                id_jugador: document.getElementById('edit-id').value,
                nombre: document.getElementById('edit-nombre').value,
                apellidos: document.getElementById('edit-apellidos').value,
                alias: document.getElementById('edit-alias').value,
                posicion_habitual: document.getElementById('edit-posicion').value,
                estado: document.getElementById('edit-estado').value
            };

            fetch('../backend/jugadores/update_jugador.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al editar: " + resultado.error);
                    }
                });
        }

        function filtrarJugadores() {
            const busqueda = document.getElementById('search').value;

            fetch(`../backend/jugadores/get_jugadores.php?query=${busqueda}`)
                .then(respuesta => respuesta.json())
                .then(datos => {
                    const tbody = document.getElementById('cuerpo-tabla');
                    tbody.innerHTML = "";

                    if (datos.ok) {
                        datos.data.forEach(jugador => {
                            tbody.innerHTML += `
                    <tr>
                        <td>${jugador.nombre}</td>
                        <td>${jugador.apellidos}</td>
                        <td>${jugador.alias}</td>
                        <td>${jugador.posicion_habitual}</td>
                        <td><span class="badge ${jugador.estado === 'lesionado' ? 'bg-danger' : 'bg-success'}">${jugador.estado}</span></td>
                        <td><button class="btn btn-sm btn-warning" onclick="abrirEditar(${jugador.id_jugador}, '${jugador.nombre}', '${jugador.apellidos}', '${jugador.alias}', '${jugador.posicion_habitual}', '${jugador.estado}')">Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="borrar(${jugador.id_jugador})">Borrar</button></td>
                    </tr>
                    `;
                        });
                    } else {
                        alert("Error al cargar jugadores: " + datos.error);
                    }
                });
        }

    </script>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Jugador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="edit-id">

                    <input type="text" id="edit-nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="text" id="edit-apellidos" class="form-control mb-2" placeholder="Apellidos" required>
                    <input type="text" id="edit-alias" class="form-control mb-2" placeholder="Alias">

                    <select id="edit-posicion" class="form-control mb-2" required>
                        <option value="" disabled selected>Selecciona una posición</option>
                        <option value="POR">Portero</option>
                        <option value="DFC">Central</option>
                        <option value="LD">Lateral Derecho</option>
                        <option value="LI">Lateral Izquierdo</option>
                        <option value="MCD">Mediocentro Defensivo</option>
                        <option value="MC">Mediocentro</option>
                        <option value="MCO">Mediocentro Ofensivo</option>
                        <option value="EXTD">Extremo Derecho</option>
                        <option value="EXTI">Extremo Izquierdo</option>
                        <option value="DC">Delantero Centro</option>
                    </select>

                    <select id="edit-estado" class="form-control mb-2">
                        <option value="activo">Activo</option>
                        <option value="lesionado">Lesionado</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="guardarEditar()">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Añadir Jugador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formNuevo">
                        <input type="text" id="add-nombre" class="form-control mb-2" placeholder="Nombre" required>
                        <input type="text" id="add-apellidos" class="form-control mb-2" placeholder="Apellidos"
                            required>
                        <input type="text" id="add-alias" class="form-control mb-2" placeholder="Alias">
                        <select id="add-posicion" class="form-control mb-2" required>
                            <option value="" disabled selected>Selecciona una posición</option>
                            <option value="POR">Portero</option>
                            <option value="DFC">Central</option>
                            <option value="LD">Lateral Derecho</option>
                            <option value="LI">Lateral Izquierdo</option>
                            <option value="MCD">Mediocentro Defensivo</option>
                            <option value="MC">Mediocentro</option>
                            <option value="MCO">Mediocentro Ofensivo</option>
                            <option value="EXTD">Extremo Derecho</option>
                            <option value="EXTI">Extremo Izquierdo</option>
                            <option value="DC">Delantero Centro</option>
                        </select>
                        <select id="add-estado" class="form-control mb-2">
                            <option value="activo">Activo</option>
                            <option value="lesionado">Lesionado</option>
                        </select>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="guardarNuevo()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
