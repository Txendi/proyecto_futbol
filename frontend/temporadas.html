<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Temporadas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Temporadas SD Eibar</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNuevo">
                + Añadir Temporada
            </button>
        </div>

        <table class="table table-striped table-bordered bg-white shadow-sm text-center">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script>

        fetch('../backend/temporadas/get_temporadas.php')
            .then(respuesta => respuesta.json())
            .then(datos => {
                if (datos.ok) {
                    const tbody = document.getElementById('cuerpo-tabla');
                    datos.data.forEach(temporada => {
                        tbody.innerHTML += `
                        <tr>
                            <td>${temporada.nombre}</td>
                            <td>${temporada.fecha_inicio}</td>
                            <td>${temporada.fecha_fin}</td>
                            <td><span class="badge ${temporada.activa ? 'bg-success' : 'bg-danger'}">${temporada.activa ? 'Activa' : 'Inactiva'}</span></td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="abrirEditar(${temporada.id_temporada}, '${temporada.nombre}', '${temporada.fecha_inicio}', '${temporada.fecha_fin}', ${temporada.activa})">Editar</button>
                                <button class="btn btn-sm btn-danger" onclick="borrarTemporada(${temporada.id_temporada})">Borrar</button>
                            </td>
                        </tr>
                    `;
                    });
                } else {
                    alert("Error al cargar temporadas: " + datos.error);
                }
            });

        function guardarNuevo() {
            const datos = {
                nombre: document.getElementById('add-nombre').value,
                fecha_inicio: document.getElementById('add-fecha-inicio').value,
                fecha_fin: document.getElementById('add-fecha-fin').value,
                activa: document.getElementById('add-activa').checked
            };

            fetch('../backend/temporadas/add_temporada.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {
                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al guardar: " + resultado.error);
                    }
                });
        }

        function borrarTemporada(id) {

            let confirmar = confirm("¿Seguro que quieres eliminar esta temporada?");

            if (confirmar) {

                fetch('../backend/temporadas/delete_temporada.php', {
                    method: 'POST',
                    body: JSON.stringify({ id_temporada: id })
                })
                    .then(respuesta => respuesta.json())
                    .then(datos => {

                        if (datos.ok) {
                            window.location.reload();
                        } else {
                            alert("Error al borrar: " + datos.error);
                        }

                    });

            }
        }

        function abrirEditar(id, nombre, inicio, fin, activa) {

            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nombre').value = nombre;
            document.getElementById('edit-fecha-inicio').value = inicio;
            document.getElementById('edit-fecha-fin').value = fin;
            document.getElementById('edit-activa').checked = activa == 1;

            const modal = new bootstrap.Modal(document.getElementById('modalEditar'));
            modal.show();
        }

        function guardarEditar() {

            const datos = {
                id_temporada: document.getElementById('edit-id').value,
                nombre: document.getElementById('edit-nombre').value,
                fecha_inicio: document.getElementById('edit-fecha-inicio').value,
                fecha_fin: document.getElementById('edit-fecha-fin').value,
                activa: document.getElementById('edit-activa').checked
            };

            fetch('../backend/temporadas/update_temporada.php', {
                method: 'POST',
                body: JSON.stringify(datos)
            })
                .then(respuesta => respuesta.json())
                .then(resultado => {

                    if (resultado.ok) {
                        window.location.reload();
                    } else {
                        alert("Error al editar: " + resultado.error);
                    }

                });
        }

    </script>

    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Añadir Temporada</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="add-nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="date" id="add-fecha-inicio" class="form-control mb-2" required>
                    <input type="date" id="add-fecha-fin" class="form-control mb-2" required>
                    <div>
                        <input type="checkbox" id="add-activa" class="form-check-input">
                        <label for="add-activa" class="form-check-label">Activa</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="guardarNuevo()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Temporada</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="edit-id">

                    <input type="text" id="edit-nombre" class="form-control mb-2" placeholder="Nombre">

                    <input type="date" id="edit-fecha-inicio" class="form-control mb-2">

                    <input type="date" id="edit-fecha-fin" class="form-control mb-2">

                    <div>
                        <input type="checkbox" id="edit-activa" class="form-check-input">
                        <label class="form-check-label">Activa</label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="guardarEditar()">Guardar cambios</button>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
